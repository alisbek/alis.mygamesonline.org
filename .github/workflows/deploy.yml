name: Deploy via SFTP

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          ENV_DB_HOST: ${{ secrets.DB_HOST }}
          ENV_DB_PORT: ${{ secrets.DB_PORT }}
          ENV_DB_NAME: ${{ secrets.DB_NAME }}
          ENV_DB_USER: ${{ secrets.DB_USER }}
          ENV_DB_PASS: ${{ secrets.DB_PASS }}
        run: |
          printf 'SITE_URL=%s\n' "$SITE_URL" > .env
          printf 'DB_HOST=%s\n' "$ENV_DB_HOST" >> .env
          printf 'DB_PORT=%s\n' "$ENV_DB_PORT" >> .env
          printf 'DB_NAME=%s\n' "$ENV_DB_NAME" >> .env
          printf 'DB_USER=%s\n' "$ENV_DB_USER" >> .env
          printf 'DB_PASS=%s\n' "$ENV_DB_PASS" >> .env

      - name: Deploy via SFTP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FTP_HOST }}
          port: ${{ secrets.FTP_PORT }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          source: ".,!.git,!.github,!.devcontainer"
          target: "/"
          overwrite: true
