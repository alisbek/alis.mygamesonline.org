name: Deploy to GCP

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy to GCP VM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          ENV_DB_HOST: ${{ secrets.DB_HOST }}
          ENV_DB_PORT: ${{ secrets.DB_PORT }}
          ENV_DB_NAME: ${{ secrets.DB_NAME }}
          ENV_DB_USER: ${{ secrets.DB_USER }}
          ENV_DB_PASS: ${{ secrets.DB_PASS }}
          PAYU_POS_ID: ${{ secrets.PAYU_POS_ID }}
          PAYU_MD5_KEY: ${{ secrets.PAYU_MD5_KEY }}
          PAYU_CLIENT_ID: ${{ secrets.PAYU_CLIENT_ID }}
          PAYU_CLIENT_SECRET: ${{ secrets.PAYU_CLIENT_SECRET }}
          PAYU_BASE_URL: ${{ secrets.PAYU_BASE_URL }}
        run: |
          printf 'SITE_URL=%s\n' "$SITE_URL" > .env
          printf 'DB_HOST=%s\n' "$ENV_DB_HOST" >> .env
          printf 'DB_PORT=%s\n' "$ENV_DB_PORT" >> .env
          printf 'DB_NAME=%s\n' "$ENV_DB_NAME" >> .env
          printf 'DB_USER=%s\n' "$ENV_DB_USER" >> .env
          printf 'DB_PASS=%s\n' "$ENV_DB_PASS" >> .env
          printf 'PAYU_POS_ID=%s\n' "$PAYU_POS_ID" >> .env
          printf 'PAYU_MD5_KEY=%s\n' "$PAYU_MD5_KEY" >> .env
          printf 'PAYU_CLIENT_ID=%s\n' "$PAYU_CLIENT_ID" >> .env
          printf 'PAYU_CLIENT_SECRET=%s\n' "$PAYU_CLIENT_SECRET" >> .env
          printf 'PAYU_BASE_URL=%s\n' "$PAYU_BASE_URL" >> .env

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.GCP_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy files via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='.htaccess' \
            --exclude='gcp-setup.ps1' \
            --exclude='gcp-check.ps1' \
            --exclude='gcp-server-setup.sh' \
            --exclude='uploads/products/' \
            --rsync-path="sudo rsync" \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.GCP_USER }}@${{ secrets.GCP_HOST }}:/var/www/feltee/

      - name: Deploy .env, .htaccess and set permissions
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.GCP_USER }}@${{ secrets.GCP_HOST }}"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            .env ${{ secrets.GCP_USER }}@${{ secrets.GCP_HOST }}:/tmp/.env.deploy
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            .htaccess ${{ secrets.GCP_USER }}@${{ secrets.GCP_HOST }}:/tmp/.htaccess.deploy
          $SSH_CMD 'sudo mv /tmp/.env.deploy /var/www/feltee/.env && sudo mv /tmp/.htaccess.deploy /var/www/feltee/.htaccess && sudo chown -R www-data:www-data /var/www/feltee && sudo chmod 600 /var/www/feltee/.env'
